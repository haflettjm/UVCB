# UVCB Configuration Template
# Copy this to config.yaml and fill in your values

server:
  host: "0.0.0.0"
  port: 8080

database:
  host: "localhost"
  port: 5432
  user: "uvcb"
  db_name: "uvcb"

redis:
  url: "localhost"
  port: 6379

nats:
  url: "nats://localhost:4222"

discord:
  guild_ids: []
